name: Data Platform CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  terraform-check:
    name: Terraform Format and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        working-directory: terraform
        run: terraform fmt -check

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  dbt-check:
    name: dbt Parse Check
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/car_shopping_analytics

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt
        run: |
          pip install "dbt-core==1.8.8" "dbt-snowflake==1.8.4" "protobuf<5"

      - name: Create dbt profile for CI
        run: |
          cat > dbt/car_shopping_analytics/profiles.yml << 'PROFILE'
          car_shopping_analytics:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: dummy
                user: dummy
                password: dummy
                role: ACCOUNTADMIN
                database: CAR_SHOPPING_ANALYTICS
                warehouse: CAR_SHOPPING_WH
                schema: STAGING
                threads: 4
          PROFILE

      - name: Parse dbt project
        working-directory: dbt/car_shopping_analytics
        run: dbt parse --profiles-dir "$DBT_PROFILES_DIR"
